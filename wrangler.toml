name = "ai-shorts-factory-api"
main = "worker/index.ts"
compatibility_date = "2024-03-18"

# R2 Bucket for Video Storage
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ai-video-bucket"

[vars]
# Public API URL for the frontend
API_URL = "https://api.aishorts.factory"

# Environment variables (Secrets should be set via 'wrangler secret put')
# OPENAI_API_KEY = ""
# GEMINI_API_KEY = ""
# YOUTUBE_API_KEY = ""
